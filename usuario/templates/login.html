{% extends "base.html" %} {% block conteudo %}

<main class="container">
  {% if status == '1' %}
  <div class="alert alert-danger" role="alert">usuario nao existe</div>
  {% endif %} {% if status == '2' %}
  <div class="alert alert-danger" role="alert">Faça Login para aceder ao sistema</div>
  {% endif %}
  <div class="row">
    <div class="col-md-3"></div>
    <div class="col-md">
      <h1 style="margin-top: 20px ; text-transform: uppercase;">Faça Login</h1>
      <form action="{% url 'valida_login' %}" method="post">
        {% csrf_token %}
        <div class="mt-3">
          <label for="email"> Email</label>
          <input
            type="email"
            name="email"
            id="email"
            class="form-control p-2"
            placeholder="email..."
          />
        </div>
        <div class="mt-3">
          <label for="password">Passowrd</label>
          <input
            type="password"
            name="password"
            id="password"
            class="form-control p-2"
            placeholder=" password..."
          />
        </div>
        <div class="mt-3">
          <input type="submit" value="Enviar" class="btn btn-success" />
          <a href="{% url 'cadastro' %}" value="Enviar" class="btn btn-warning"
            >cadastre-se</a
          >
        </div>
      </form>
    </div>
    <div class="col-md-3"></div>
  </div>
</main>

{% endblock conteudo %}
